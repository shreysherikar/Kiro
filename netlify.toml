[build]
  command = "pip install -r requirements.txt --target netlify/functions/lib"
  publish = "static"
  functions = "netlify/functions"

[build.environment]
  PYTHON_VERSION = "3.11"

# Redirect all requests to the Flask serverless function
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/app"
  status = 200
