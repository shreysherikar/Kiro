{% extends "base.html" %}

{% block title %}File Too Large - InspireHer{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto text-center py-16">
    <div class="text-orange-500 text-8xl font-bold mb-4">413</div>
    <h1 class="text-3xl font-bold text-gray-800 mb-4">File Too Large</h1>
    <p class="text-gray-600 mb-8">
        The file you tried to upload exceeds the maximum allowed size of 16MB.
        Please choose a smaller file and try again.
    </p>
    <a href="/submit" class="bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 px-6 rounded transition">
        Back to Submit
    </a>
</div>
{% endblock %}
